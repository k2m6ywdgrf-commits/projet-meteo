<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="28%" r="78%">
      <stop offset="0%" stop-color="#1C1860"/>
      <stop offset="50%" stop-color="#0F0D38"/>
      <stop offset="100%" stop-color="#060516"/>
    </radialGradient>
    <radialGradient id="sun" cx="35%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#FFF0B0"/>
      <stop offset="40%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    <linearGradient id="cloud" x1="15%" y1="0%" x2="65%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0DBEE"/>
    </linearGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5EEADA"/>
      <stop offset="100%" stop-color="#0EA5A0"/>
    </linearGradient>
    <filter id="sunGlow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cloudShadow" x="-12%" y="-12%" width="124%" height="136%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="dropGlow" x="-50%" y="-30%" width="200%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="512" height="512" rx="115"/></clipPath>
  </defs>
