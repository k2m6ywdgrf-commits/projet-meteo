<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphique Évolution Investissements</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 26, 42, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #64748b;
            --green-glow: #4ade80;
            --blue-glow: #38bdf8;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Conteneur principal (Style Liquid Glass sur fond noir) */
        .chart-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 24px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .chart-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .chart-title {
            color: var(--text-main);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin: 0;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 260px;
        }

        /* Légende personnalisée */
        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
            font-size: 13px;
            color: #cbd5e1;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .line-dashed {
            border-bottom: 2px dashed var(--text-muted);
            width: 20px;
            height: 0;
        }

        .line-solid {
            background: linear-gradient(90deg, var(--blue-glow), var(--green-glow));
            width: 20px;
            height: 3px;
            border-radius: 2px;
        }

        /* Badge du bas (Récapitulatif) */
        .chart-footer-badge {
            background: rgba(13, 18, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px 16px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .badge-info {
            color: var(--text-muted);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-info strong {
            color: var(--text-main);
        }

        .badge-date {
            color: var(--text-main);
            font-size: 14px;
            font-weight: 700;
        }

        .badge-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .gain-val {
            color: var(--green-glow);
            font-size: 15px;
            font-weight: 700;
        }

        .gain-pct {
            color: var(--green-glow);
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }
    </style>
</head>
<body>

    <div class="chart-card">
        <div class="chart-header">
            <span>📊</span>
            <h2 class="chart-title">Courbe d'évolution : Investi vs Valeur Marché</h2>
        </div>

        <div class="chart-container">
            <canvas id="evolutionChart"></canvas>
        </div>

        <div class="chart-legend">
            <div class="legend-item">
                <div class="line-dashed"></div>
                <span>Montant Investi</span>
            </div>
            <div class="legend-item">
                <div class="line-solid"></div>
                <span>Valeur Marché</span>
            </div>
        </div>

        <div class="chart-footer-badge">
            <div class="badge-left">
                <div class="badge-info">📋 <strong>2</strong> points enregistrés · dernier :</div>
                <div class="badge-date">03/06/2026</div>
            </div>
            <div class="badge-right">
                <div class="gain-val">+133 €</div>
                <div class="gain-pct">(+41.7%) ▼</div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('evolutionChart').getContext('2d');

        // Création des gradients pour le rendu lumineux / néon
        const lineGradient = ctx.createLinearGradient(0, 0, 400, 0);
        lineGradient.addColorStop(0, '#38bdf8'); // Bleu/Turquoise de gauche
        lineGradient.addColorStop(1, '#4ade80'); // Vert de droite

        const fillGradient = ctx.createLinearGradient(0, 0, 0, 250);
        fillGradient.addColorStop(0, 'rgba(74, 222, 128, 0.15)'); // Éclat vert transparent en haut
        fillGradient.addColorStop(1, 'rgba(11, 15, 25, 0)');        // Fondu complet vers le bas

        // Configuration de Chart.js
        const data = {
            labels: ['03/06', '03/06/2026'], // Reprise exacte des labels de ton image
            datasets: [
                {
                    label: 'Valeur Marché',
                    data: [325, 450], // Données indicatives basées sur l'échelle visuelle
                    borderColor: lineGradient,
                    borderWidth: 3,
                    pointBackgroundColor: lineGradient,
                    pointBorderColor: '#0b0f19',
                    pointBorderWidth: 1,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    fill: true,
                    backgroundColor: fillGradient,
                    tension: 0, // Ligne droite directe
                    order: 1
                },
                {
                    label: 'Montant Investi',
                    data: [312, 312], // Ligne horizontale en pointillés
                    borderColor: '#334155',
                    borderWidth: 1.5,
                    borderDash: [5, 5],
                    pointRadius: 0, // Pas de points visibles sur cette ligne
                    fill: false,
                    tension: 0,
                    order: 2
                }
            ]
        };

        const config = {
            type: 'line',
            data: data,
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false // Désactivé car on utilise une légende HTML sur mesure en dessous
                    },
                    tooltip: {
                        backgroundColor: 'rgba(20, 26, 42, 0.9)',
                        titleColor: '#fff',
                        bodyColor: '#fff',
                        borderColor: 'rgba(255, 255, 255, 0.1)',
                        borderWidth: 1
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false // Pas de lignes verticales de grille
                        },
                        ticks: {
                            color: '#64748b',
                            font: {
                                size: 12
                            },
                            padding: 10
                        },
                        border: {
                            display: false
                        }
                    },
                    y: {
                        min: 260,
                        max: 510,
                        grid: {
                            color: 'rgba(51, 65, 85, 0.25)', // Lignes horizontales très discrètes
                        },
                        ticks: {
                            color: '#64748b',
                            stepSize: 52, // Pour espacer les graduations proprement comme sur le modèle
                            font: {
                                size: 11
                            },
                            padding: 8
                        },
                        border: {
                            display: false
                        }
                    }
                }
            }
        };

        new Chart(ctx, config);
    </script>
</body>
</html>
