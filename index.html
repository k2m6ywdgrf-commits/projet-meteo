<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mon Patrimoine</title>
    <style>
        /* --- STYLE GENERAL & THEME SOMBRE --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px; /* Taille idéale pour iPhone */
            padding: 15px;
            box-sizing: border-box;
        }

        /* --- STYLE LIQUID GLASS (GLASSMORPHISM) --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2, h3 {
            margin-top: 0;
            font-weight: 500;
        }

        .solde-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .valeur {
            font-weight: 600;
            color: #00bfff;
        }

        /* --- STYLISATION DU BOUTON D'IMPORT --- */
        .btn-import {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.07);
            color: #ffffff;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 500;
            text-align: center;
            transition: background 0.2s ease;
            -webkit-tap-highlight-color: transparent; /* Supprime le flash bleu sur iPhone */
        }

        .btn-import:active {
            background: rgba(255, 255, 255, 0.15);
        }

        #import-feedback {
            display: none;
            font-size: 0.85rem;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-top: 15px;
            line-height: 1.4;
        }

        /* --- STYLE DU TABLEAU DE COMPTES --- */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            font-weight: 400;
            padding-bottom: 8px;
            text-transform: uppercase;
        }

        td {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="glass-card">
            <h2>Mon Portefeuille</h2>
            
            <div class="solde-container">
                <span>Espèces PEA :</span>
                <span id="pea-cash" class="valeur">0.00 €</span>
            </div>
            <div class="solde-container">
                <span>Espèces CTO :</span>
                <span id="cto-cash" class="valeur">0.00 €</span>
            </div>
        </div>

        <div class="glass-card">
            <h3>📥 Synchronisation Courtier</h3>
            <p style="color: rgba(255, 255, 255, 0.5); font-size: 0.85rem; margin-bottom: 15px; line-height: 1.4;">
                Importez votre fichier CSV exporté pour mettre à jour automatiquement vos historiques et vos soldes espèces.
            </p>
            
            <label for="courtier-csv-file" class="btn-import">
                📁 Choisir le fichier CSV
            </label>
            <input type="file" id="courtier-csv-file" accept=".csv" style="display: none;" onchange="importerCSV_Courtier(event)">
            
            <div id="import-feedback"></div>
        </div>

        <div class="glass-card">
            <h3>Derniers mouvements (PEA)</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Actif</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="table-historique-pea">
                    <tr>
                        <td colspan="4" style="color: rgba(255,255,255,0.3); text-align: center;">Aucune donnée importée</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        // 1. Initialisation de la structure de données locale (appData)
        // Elle tente de charger ton localStorage actuel, sinon elle crée une base propre.
        let appData = JSON.parse(localStorage.getItem('patrimoine_multi_v6')) || {
            pea: { historique: [], especes: 0 },
            cto: { historique: [], especes: 0 }
        };

        // Fonction pour nettoyer les guillemets et séparer correctement les colonnes du CSV
        function parseLigneCSV(ligne) {
            const resultat = [];
            let enGuillemets = false;
            let valeurCourante = '';
            
            for (let i = 0; i < ligne.length; i++) {
                let char = ligne[i];
                if (char === '"') {
                    enGuillemets = !enGuillemets;
                } else if (char === ',' && !enGuillemets) {
                    resultat.push(valeurCourante.trim());
                    valeurCourante = '';
                } else {
                    valeurCourante += char;
                }
            }
            resultat.push(valeurCourante.trim());
            return resultat;
        }

        // 2. Traitement du fichier CSV importé
        function importerCSV_Courtier(event) {
            const fichier = event.target.files[0];
            const feedback = document.getElementById('import-feedback');
            
            if (!fichier) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const contenu = e.target.result;
                    const lignes = contenu.split(/\r?\n/);
                    
                    if (lignes.length < 2) {
                        throw new Error("Le fichier semble vide ou mal formaté.");
                    }

                    // Récupération de la première ligne pour connaître le nom des colonnes
                    const entetes = parseLigneCSV(lignes[0]);
                    
                    let countPEA = 0;
                    let countCTO = 0;

                    // Remise à zéro propre pour éviter les doublons à chaque import
                    appData.pea.historique = [];
                    appData.cto.historique = [];
                    appData.pea.especes = 0;
                    appData.cto.especes = 0;

                    // On parcourt chaque ligne du fichier (sauf l'en-tête index 0)
                    for (let i = 1; i < lignes.length; i++) {
                        if (!lignes[i].trim()) continue; // Ignore les lignes vides de fin de fichier

                        const colonnes = parseLigneCSV(lignes[i]);
                        const r = {};
                        
                        // On crée un objet "clé: valeur" basé sur l'en-tête (ex: r.amount, r.account_type)
                        entetes.forEach((nom, index) => {
                            r[nom] = colonnes[index] || "";
                        });

                        // Conversions numériques
                        const montantNet = parseFloat(r.amount) || 0;
                        const prixUnitaire = parseFloat(r.price) || 0;
                        const quantite = parseFloat(r.shares) || 0;
                        const frais = parseFloat(r.fee) || 0;
                        const taxe = parseFloat(r.tax) || 0;

                        // Sélection automatique du bon compte (PEA ou CTO)
                        let compteCible = appData.cto;
                        if (r.account_type === "PEA") {
                            compteCible = appData.pea;
                            countPEA++;
                        } else {
                            countCTO++;
                        }

                        // Mise à jour de la poche espèces (le cash disponible)
                        compteCible.especes += montantNet;

                        // Structuration et ajout du mouvement dans l'historique de l'application
                        if (r.category === "TRADING") {
                            compteCible.historique.push({
                                date: r.date,
                                type: r.type === "BUY" ? "Achat" : "Vente",
                                nom: r.name,
                                ticker: r.symbol,
                                quantite: Math.abs(quantite),
                                prix: prixUnitaire,
                                total: Math.abs(montantNet),
                                frais: Math.abs(frais) + Math.abs(taxe)
                            });
                        } else if (r.category === "CASH" && (r.type === "DIVIDEND" || r.type === "DIVIDEND_EQUIVALENT_PAYMENT")) {
                            compteCible.historique.push({
                                date: r.date,
                                type: "Dividende",
                                nom: r.name,
                                total: montantNet
                            });
                        } else if (r.category === "CASH") {
                            let libelle = "Virement";
                            if (r.type === "INTEREST_PAYMENT") libelle = "Intérêts";
                            
                            compteCible.historique.push({
                                date: r.date,
                                type: libelle,
                                nom: r.description || "Mouvement Cash",
                                total: montantNet
                            });
                        }
                    }

                    // 3. Sauvegarde définitive dans le localStorage de ton iPhone
                    localStorage.setItem('patrimoine_multi_v6', JSON.stringify(appData));

                    // Affichage du message de succès (Style Glassmorphism Vert)
                    feedback.style.display = "block";
                    feedback.style.background = "rgba(46, 204, 113, 0.15)";
                    feedback.style.color = "#2ecc71";
                    feedback.style.border = "1px solid rgba(46, 204, 113, 0.3)";
                    feedback.innerHTML = `✅ Synchronisation terminée !<br>${countPEA} lignes PEA et ${countCTO} lignes CTO ajoutées.`;

                    // Actualiser les éléments affichés à l'écran
                    mettreAJourInterface();

                } catch (erreur) {
                    // Affichage du message d'erreur (Style Glassmorphism Rouge)
                    feedback.style.display = "block";
                    feedback.style.background = "rgba(231, 76, 60, 0.15)";
                    feedback.style.color = "#e74c3c";
                    feedback.style.border = "1px solid rgba(231, 76, 60, 0.3)";
                    feedback.innerText = "❌ Fichier illisible : " + erreur.message;
                }
            };

            reader.readAsText(fichier);
        }

        // 4. Fonction d'affichage à l'écran
        function mettreAJourInterface() {
            // Mise à jour des compteurs de cash sur l'écran d'accueil
            document.getElementById('pea-cash').innerText = (appData.pea.especes || 0).toFixed(2) + " €";
            document.getElementById('cto-cash').innerText = (appData.cto.especes || 0).toFixed(2) + " €";

            // Remplissage du tableau d'historique du PEA à titre d'exemple
            const tbodyPEA = document.getElementById('table-historique-pea');
            if (appData.pea.historique.length === 0) {
                tbodyPEA.innerHTML = `<tr><td colspan="4" style="color: rgba(255,255,255,0.3); text-align: center;">Aucun mouvement</td></tr>`;
                return;
            }

            // On prend les 5 derniers mouvements pour ne pas surcharger l'écran de l'iPhone
            let htmlHTML = "";
            const derniersMouvements = appData.pea.historique.slice(0, 5);
            
            derniersMouvements.forEach(m => {
                let couleurType = m.type === "Achat" ? "#e74c3c" : "#2ecc71";
                if(m.type === "Virement" || m.type === "Dividende") couleurType = "#00bfff";

                htmlHTML += `
                    <tr>
                        <td style="color: rgba(255,255,255,0.6); font-size: 0.85rem;">${m.date}</td>
                        <td style="color: ${couleurType}; font-weight: 500;">${m.type}</td>
                        <td>${m.nom}</td>
                        <td style="text-align: right; font-weight: 500;">${m.total.toFixed(2)} €</td>
                    </tr>
                `;
            });
            tbodyPEA.innerHTML = htmlHTML;
        }

        // Lancement automatique au chargement initial de la PWA
        window.onload = mettreAJourInterface;
    </script>
</body>
</html>
